<head>

  <style>
    /* ── Playground overrides ── */
    html {
      /* Dots live on html so they paint behind every element */
      background-color: #161514;
      background-image: radial-gradient(circle, rgba(255,255,255,0.13) 1px, transparent 1px);
      background-size: 28px 28px;
      background-attachment: fixed;
      height: 100%;
    }

    body {
      background: transparent; /* let html's dot canvas show through */
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    /* Full-screen canvas for draggable blocks */
    .playground-field {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Individual blocks ── */
    .pg-block {
      position: absolute;
      display: block;
      border-radius: 16px;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: box-shadow 0.2s ease;
      /* GPU compositing layer — critical for mobile smoothness */
      will-change: transform;
      -webkit-transform: translateZ(0);
    }
    .pg-block:hover {
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.65);
    }
    .pg-block.is-dragging {
      cursor: grabbing;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.75);
      transition: none; /* instant during drag */
    }

    .pg-block img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      draggable: false;
    }

    /* ── Chaos mode: green viewport glow ── */
    @keyframes chaos-pulse {
      0%, 100% { opacity: 0.65; }
      50%       { opacity: 1; }
    }

    .chaos-border {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9986;
      background:
        linear-gradient(to right,  rgba(199,213,159,0.18) 0%, transparent 5%, transparent 95%, rgba(199,213,159,0.18) 100%),
        linear-gradient(to bottom, rgba(199,213,159,0.18) 0%, transparent 5%, transparent 95%, rgba(199,213,159,0.18) 100%);
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .chaos-border.active {
      opacity: 1;
      animation: chaos-pulse 3s ease-in-out infinite;
    }

    /* ── Chaos mode: pockets (4 corners + 2 mid-sides) ── */
    .pocket {
      position: fixed;
      z-index: 9987;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .pocket.active { opacity: 1; }
    .pocket::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(6, 6, 8, 0.92);
      border: 1px solid rgba(199, 213, 159, 0.28);
    }

    /* Corner pockets — quarter circles */
    .pocket-tl, .pocket-tr, .pocket-bl, .pocket-br {
      width: 52px;
      height: 52px;
    }
    .pocket-tl { top: 0; left: 0; }
    .pocket-tl::before { border-radius: 0 0 100% 0; }
    .pocket-tr { top: 0; right: 0; }
    .pocket-tr::before { border-radius: 0 0 0 100%; }
    .pocket-bl { bottom: 0; left: 0; }
    .pocket-bl::before { border-radius: 0 100% 0 0; }
    .pocket-br { bottom: 0; right: 0; }
    .pocket-br::before { border-radius: 100% 0 0 0; }

    /* Mid-side pockets — semicircles */
    .pocket-ml, .pocket-mr {
      width: 36px;
      height: 48px;
      top: 50%;
      transform: translateY(-50%);
    }
    .pocket-ml { left: 0; }
    .pocket-ml::before { border-radius: 0 100% 100% 0; }
    .pocket-mr { right: 0; }
    .pocket-mr::before { border-radius: 100% 0 0 100%; }

    /* ── Pool ball style (chaos mode) ── */
    .pg-block.pool-ball {
      border-radius: 50% !important;
      box-shadow: 0 6px 22px rgba(0,0,0,0.65), inset 0 -2px 5px rgba(0,0,0,0.25) !important;
      cursor: default !important;
    }
    .pg-block.pool-ball::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 36% 28%, rgba(255,255,255,0.38) 0%, transparent 52%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Chaos mode: cue ball ── */
    .chaos-ball {
      position: fixed;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #ffffff, #cccccc);
      box-shadow: 0 4px 18px rgba(0,0,0,0.65), inset 0 1px 4px rgba(255,255,255,0.7);
      cursor: grab;
      z-index: 9995;
      pointer-events: all;
    }
    .chaos-ball.grabbing { cursor: grabbing; }

    /* ── Chaos mode: aim canvas ── */
    #aimCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9990;
    }

    /* ── Chaos mode: center hint ── */
    .chaos-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 19, 23, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 24px 32px;
      font-family: 'Roboto', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.88);
      text-align: center;
      white-space: nowrap;
      z-index: 9994;
      pointer-events: all;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }
    .chaos-hint span {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.32);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

  </style>
</head>
