<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Danilo Hinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Playground overrides ── */
    html {
      /* Dots live on html so they paint behind every element */
      background-color: #161514;
      background-image: radial-gradient(circle, rgba(255,255,255,0.13) 1px, transparent 1px);
      background-size: 28px 28px;
      background-attachment: fixed;
      height: 100%;
    }

    body {
      background: transparent; /* let html's dot canvas show through */
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    /* Full-screen canvas for draggable blocks */
    .playground-field {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Individual blocks ── */
    .pg-block {
      position: absolute;
      display: block;
      border-radius: 16px;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: box-shadow 0.2s ease;
      /* lifted on hover */
    }
    .pg-block:hover {
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.65);
    }
    .pg-block.is-dragging {
      cursor: grabbing;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.75);
      transition: none; /* instant during drag */
    }

    .pg-block img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      draggable: false;
    }

    /* Open-link indicator on hover */
    .pg-block::after {
      content: '↗';
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pg-block:hover::after {
      opacity: 1;
    }
  </style>
</head>
<body id="playground">

  <!-- HEADER -->
  <header class="header">
    <nav class="nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="playground.html" class="nav-link active">Playground</a>
      <a href="resume.html" class="nav-link">Resume</a>
    </nav>
    <a href="index.html" class="logo-dot"></a>
    <div class="header-right">
      <button class="btn-dark">Get in Touch</button>
    </div>
  </header>

  <!-- PLAYGROUND CANVAS -->
  <main class="playground-field" id="playgroundField">

    <!-- Block 1 — replace src + href when ready -->
    <a class="pg-block" href="#" target="_blank" rel="noopener"
       data-w="300" data-h="380" style="width:300px;height:380px">
      <img src="https://picsum.photos/seed/pg1/300/380" alt="" draggable="false" />
    </a>

    <!-- Block 2 -->
    <a class="pg-block" href="#" target="_blank" rel="noopener"
       data-w="340" data-h="240" style="width:340px;height:240px">
      <img src="https://picsum.photos/seed/pg2/340/240" alt="" draggable="false" />
    </a>

    <!-- Block 3 -->
    <a class="pg-block" href="#" target="_blank" rel="noopener"
       data-w="260" data-h="320" style="width:260px;height:320px">
      <img src="https://picsum.photos/seed/pg3/260/320" alt="" draggable="false" />
    </a>

    <!-- Block 4 -->
    <a class="pg-block" href="#" target="_blank" rel="noopener"
       data-w="400" data-h="280" style="width:400px;height:280px">
      <img src="https://picsum.photos/seed/pg4/400/280" alt="" draggable="false" />
    </a>

    <!-- Block 5 -->
    <a class="pg-block" href="#" target="_blank" rel="noopener"
       data-w="280" data-h="280" style="width:280px;height:280px">
      <img src="https://picsum.photos/seed/pg5/280/280" alt="" draggable="false" />
    </a>

    <!-- Block 6 -->
    <a class="pg-block" href="#" target="_blank" rel="noopener"
       data-w="320" data-h="420" style="width:320px;height:420px">
      <img src="https://picsum.photos/seed/pg6/320/420" alt="" draggable="false" />
    </a>

  </main>

  <!-- Music Player: [Info] | [Controls] | [Progress] -->
  <div class="music-player" id="musicPlayer">
    <div class="mp-info">
      <span class="mp-title" id="mpTitle">Loading…</span>
      <span class="mp-artist" id="mpArtist">—</span>
    </div>
    <div class="mp-divider"></div>
    <div class="mp-controls">
      <button class="mp-btn" id="mpPrev" aria-label="Previous">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="2.5" height="12" rx="1"/><path d="M13.5 3.5L6 8l7.5 4.5V3.5z"/></svg>
      </button>
      <button class="mp-btn mp-btn--play" id="mpPlay" aria-label="Play">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5l9 5.5-9 5.5z"/></svg>
      </button>
      <button class="mp-btn" id="mpNext" aria-label="Next">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><rect x="11.5" y="2" width="2.5" height="12" rx="1"/><path d="M2.5 3.5L10 8 2.5 12.5V3.5z"/></svg>
      </button>
    </div>
    <div class="mp-divider"></div>
    <div class="mp-progress">
      <span class="mp-time" id="mpCurrent">0:00</span>
      <div class="mp-bar" id="mpBar"><div class="mp-fill" id="mpFill"></div></div>
      <span class="mp-time" id="mpDuration">0:00</span>
    </div>
  </div>

  <!-- Page transition overlay -->
  <div id="page-transition">
    <div class="transition-box"></div>
  </div>

  <script src="playground.js"></script>
  <script src="player.js"></script>
  <script src="transition.js"></script>
</body>
</html>
