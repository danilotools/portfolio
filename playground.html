  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Playground overrides ── */
    html {
      /* Dots live on html so they paint behind every element */
      background-color: #161514;
      background-image: radial-gradient(circle, rgba(255,255,255,0.13) 1px, transparent 1px);
      background-size: 28px 28px;
      background-attachment: fixed;
      height: 100%;
    }

    body {
      background: transparent; /* let html's dot canvas show through */
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    /* Full-screen canvas for draggable blocks */
    .playground-field {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Individual blocks ── */
    .pg-block {
      position: absolute;
      display: block;
      border-radius: 16px;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: box-shadow 0.2s ease;
      /* GPU compositing layer — critical for mobile smoothness */
      will-change: transform;
      -webkit-transform: translateZ(0);
    }
    .pg-block:hover {
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.65);
    }
    .pg-block.is-dragging {
      cursor: grabbing;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.75);
      transition: none; /* instant during drag */
    }

    .pg-block img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      draggable: false;
    }

    /* ── Chaos Mode ── */
    .chaos-ball {
      position: fixed;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle at 36% 32%, #ffffff 0%, #c8c8c8 100%);
      box-shadow: 0 3px 10px rgba(0,0,0,0.6), inset 0 -2px 4px rgba(0,0,0,0.2);
      cursor: grab;
      z-index: 9995;
      pointer-events: all;
      transition: transform 0.15s ease;
    }
    .chaos-ball:hover { transform: scale(1.08); }
    .chaos-ball.grabbing { cursor: grabbing; transform: scale(1.12); }

    .chaos-hint {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 112px;
      margin: 0;
      font-family: 'Roboto', sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.07em;
      text-align: center;
      pointer-events: none;
      z-index: 9994;
      white-space: nowrap;
      transition: opacity 0.9s ease;
    }

  </style>
</head>

    <div class="music-player" id="musicPlayer">

      </div>

      <div class="mp-controls">
        <button class="mp-btn" id="mpPrev" aria-label="Previous">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="2.5" height="12" rx="1"/><path d="M13.5 3.5L6 8l7.5 4.5V3.5z"/></svg>
        </button>
        <button class="mp-btn mp-btn--play" id="mpPlay" aria-label="Play">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5l9 5.5-9 5.5z"/></svg>
        </button>
        <button class="mp-btn" id="mpNext" aria-label="Next">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><rect x="11.5" y="2" width="2.5" height="12" rx="1"/><path d="M2.5 3.5L10 8 2.5 12.5V3.5z"/></svg>
        </button>
